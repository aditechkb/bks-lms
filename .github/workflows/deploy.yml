name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hostinger
        run: |
          ssh -o StrictHostKeyChecking=no \
          -p ${{ secrets.HOSTINGER_PORT }} \
          ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'

          echo "🚀 Starting deployment..."

          cd domains//kameswari.net/public_html/wp-content/themes/bks-lms || exit

          echo "📥 Pulling latest code..."
          git reset --hard
          git pull origin main

          echo "📦 Installing dependencies..."
          npm install

          echo "🏗️ Building project..."
          npm run build

          echo "✅ Deployment completed"

          EOF
